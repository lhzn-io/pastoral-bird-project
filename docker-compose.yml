version: '3.8'

services:
  bird-admin:
    build: .
    container_name: bird-admin
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      # If running Ollama natively on Mac, host.docker.internal resolves to the Mac host.
      - OLLAMA_HOST=http://host.docker.internal:11434
    volumes:
      # Mount GCP Application Default Credentials from Mac host to container
      - ~/.config/gcloud:/root/.config/gcloud:ro

  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: ebird-cloudflare-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run ebird-admin
    volumes:
      # Mount the cloudflared configuration and credentials from the Mac host
      - /Users/lhzn/.cloudflared:/etc/cloudflared
    depends_on:
      - bird-admin
