version: '3.8'

services:
  ebird-admin:
    build: .
    container_name: ebird-admin
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      # If running Ollama natively on Mac, host.docker.internal resolves to the Mac host.
      - OLLAMA_HOST=http://host.docker.internal:11434

  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: ebird-cloudflare-tunnel
    restart: unless-stopped
    # Use host network so the tunnel can reach the exposed 8501 port natively
    network_mode: "host"
    command: tunnel --no-autoupdate run ebird-admin
    volumes:
      # Mount the cloudflared configuration and credentials from the Mac host
      - /Users/lhzn/.cloudflared:/etc/cloudflared
    depends_on:
      - ebird-admin
